apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: syla-yednosti
spec:
  replicas: 2          # Дві копії для відмовостійкості
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
      annotations:                              
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/-/metrics"
    spec:
      initContainers:
        # initContainer запускається ПЕРЕД основним контейнером
        # Виконує міграції БД один раз при старті
        - name: migrate
          image: 192.168.10.10:5000/syla-yednosti:v1
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - secretRef:
                name: django-secret
            - configMapRef:
                name: django-config
      containers:
        - name: django
          image: 192.168.10.10:5000/syla-yednosti:v1
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: django-secret
            - configMapRef:
                name: django-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Перевірка чи Pod живий
          livenessProbe:
            httpGet:
              path: /login/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          # Перевірка чи Pod готовий приймати трафік
          readinessProbe:
            httpGet:
              path: /login/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: syla-yednosti
spec:
  selector:
    app: django
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP     # Доступний тільки всередині кластера